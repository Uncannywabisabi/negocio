<!DOCTYPE html>
<html lang="es" class="bg-background">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel Admin - Sorteo de Perfumes</title>
    <meta name="description" content="Panel de administración del sorteo." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="site-header">
      <div class="header-inner">
        <div class="brand">
          <span class="dot"></span>
          <span>Panel de Administración</span>
        </div>
        <nav class="nav-links">
          <a href="index.html">Ver página pública</a>
          <a href="#" id="btnLogout" class="btn-admin hidden">Salir</a>
        </nav>
      </div>
    </header>

    <!-- LOGIN -->
    <section id="loginView" class="container">
      <div class="admin-login">
        <h2>Acceso Admin</h2>
        <p>Ingresa la clave para administrar el sorteo.</p>
        <div class="field">
          <label for="inpClave">Contraseña</label>
          <input type="password" id="inpClave" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary btn-block" id="btnEntrar">
          Entrar
        </button>
      </div>
    </section>

    <!-- PANEL -->
    <section id="panelView" class="container hidden">
      <!-- ESTADÍSTICAS -->
      <div class="admin-stats">
        <div class="stat-card">
          <div class="value" id="stOcupados">0</div>
          <div class="label">Números vendidos</div>
        </div>
        <div class="stat-card">
          <div class="value" id="stPagados">0</div>
          <div class="label">Pagados</div>
        </div>
        <div class="stat-card">
          <div class="value" id="stPendientes">0</div>
          <div class="label">Pendientes</div>
        </div>
        <div class="stat-card">
          <div class="value" id="stRecaudado">RD$ 0</div>
          <div class="label">Recaudado</div>
        </div>
      </div>

      <!-- TOOLBAR -->
      <div class="admin-toolbar">
        <input
          type="text"
          id="inpBuscar"
          placeholder="Buscar por número, nombre o teléfono..."
        />
      </div>

      <!-- TABLA -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Teléfono</th>
              <th>Estado pago</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaBody">
            <tr>
              <td colspan="5" class="loading">Cargando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script type="module" src="admin.js"></script>
  </body>
</html>
